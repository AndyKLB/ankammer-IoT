apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ankammer-playground
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitlab-webservice-default.gitlab.svc.cluster.local:8181/root/ankammer-iot.git
    targetRevision: HEAD
    path: p3/confs
    directory:
      recurse:  false
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
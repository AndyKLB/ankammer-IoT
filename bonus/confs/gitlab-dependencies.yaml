apiVersion: v1
kind: Secret
metadata:
  name: postgresql-password
  namespace: gitlab
type: Opaque
stringData:
  password: gitlab
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: gitlab
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: gitlab
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:17-alpine
        ports:
          - containerPort:  5432
        env:
        - name: POSTGRES_USER
          value: gitlab
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-password
              key: password
        - name: POSTGRES_DB
          value: gitlabhq_production
        - name: PGDATA
          value: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 8Gi
---

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace:  gitlab
spec:
  selector:
    app:  redis
  ports:
  - port: 6379
    targetPort: 6379  # targetport optionnel si similaire a port qui correspond au containerPort qui lui est informatif non declaratif, le container lui meme designe son port d'ecoute
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: gitlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app:  redis
  template:
    metadata:
      labels:
        app:  redis
    spec:
      containers:
      - name: redis
        image:  redis:7-alpine
        args: ["--save", "", "--appendonly", "no"]
        ports:
        - containerPort: 6379
---

apiVersion: v1
kind: Secret
metadata:
  name: minio-cred
  namespace:  gitlab
type: Opaque
stringData:
  accesskey:  gitlab-minio
  secretkey:  gitlab-minio-password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace:  gitlab
spec:
  accessModes:  [ReadWriteOnce]
  resources:
    requests:
      storage:  10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: gitlab
spec:
  selector:
    app:  minio
  ports:
  - port: 9000
    targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace:  gitlab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app:  minio
  template:
    metadata:
      labels:
        app:  minio
    spec:
      containers:
      - name: minio
        image:  minio/minio:latest
        args: ["server", "/data"]
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-cred
              key:  accesskey
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-cred
              key:  secretkey
        ports:
        - containerPort:  9000
        volumeMounts:
        - name: data
          mountPath:  /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName:  minio-data
---

apiVersion: batch/v1
kind: Job
metadata:
  name: minio-buckets
  namespace:  gitlab
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy:  OnFailure
      containers:
      - name: mc
        image:  minio/mc:latest
        env:
        - name: MC_USER
          valueFrom:
            secretKeyRef:
              name: minio-cred
              key:  accesskey
        - name: MC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-cred
              key:  secretkey
        command:
        - /bin/sh
        - -c
        - |
          until mc alias set local http://minio:9000 "$MC_USER" "$MC_PASSWORD"; do
            echo "MinIo not ready yet..."; sleep 3
          done
          for b in gitlab-artifacts gitlab-lfs gitlab-uploads gitlab-packages gitlab-backups gitlab-tmp; do
            mc mb -p "local/$b" || true
          done
          mc ls local
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-storage
  namespace:  gitlab
type: Opaque
stringData:
  connection: |
    provider: AWS
    region: us-east-1
    aws_access_key_id: gitlab-minio
    aws_secret_access_key:  gitlab-minio-password
    aws_signature_version:  4
    host: minio.gitlab.svc.cluster.local:9000
    path_style: true
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-toolbox-backup-storage
  namespace:  gitlab
type: Opaque
stringData:
  config: |
    [default]
    access_key = gitlab-minio
    secret_key = gitlab-minio-password
    host_base = minio.gitlab.svc.cluster.local:9000
    host_bucket =
    use_https = False
    check_ssl_certificate = False
    signature_v2 = False

# Deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
      - name: app2
        image: ankammer/app2:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80

---

# Service

apiVersion: v1
kind: Service
metadata:
  name: app2
  labels:
    app: app2
    tier: app2
spec:
  selector:
    app: app2
  ports:
  - name: http
    port: 80
    targetPort: 80
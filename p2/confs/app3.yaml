# Deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
      - name: app3
        image: ankammer/app3:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80

---

# Service

apiVersion: v1
kind: Service
metadata:
  name: app3
  labels:
    app: app3
    tier: app3
spec:
  selector:
    app: app3
  ports:
  - name: http
    port: 80
    targetPort: 80